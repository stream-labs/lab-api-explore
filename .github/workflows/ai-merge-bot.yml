name: ai-merge-bot
on:
  workflow_dispatch:
    inputs:
      issue_num:
        required: true
jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: AI processes issue and takes action
        env:
          GH_TOKEN: ${{ github.token }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_NUM: ${{ github.event.inputs.issue_num }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json, urllib.request, os, re

          token = os.environ["GH_TOKEN"]
          or_key = os.environ["OPENROUTER_KEY"]
          repo = os.environ["REPO"]
          num = os.environ["ISSUE_NUM"]

          def ghapi(method, url, data=None):
              payload = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=payload, method=method,
                  headers={"Authorization": f"token {token}",
                           "Content-Type": "application/json",
                           "Accept": "application/vnd.github+json"})
              try:
                  return json.loads(urllib.request.urlopen(req).read())
              except Exception as e:
                  try: return json.loads(e.read().decode())
                  except: return {"error": str(e)}

          issue = ghapi("GET", f"https://api.github.com/repos/{repo}/issues/{num}")
          title = issue.get("title", "")
          body = issue.get("body", "")

          prs = ghapi("GET", f"https://api.github.com/repos/{repo}/pulls?state=open&per_page=10")
          pr_list = ""
          if isinstance(prs, list):
              for p in prs:
                  pr_list += f"  PR #{p['number']}: {p['title']} (by {p['user']['login']})\n"
          if not pr_list:
              pr_list = "  None\n"

          prompt = [
              {"role": "system", "content":
                  "You are an AI DevOps assistant that helps triage issues and manage PRs for a software team. "
                  "You analyze issues and determine what actions to take.\n\n"
                  "Available actions (include in your response when appropriate):\n"
                  "- MERGE_PR #N - merge a pull request that is ready\n"
                  "- CLOSE_ISSUE #N - close a resolved issue\n"
                  "- LABEL #N with <label> - add a label to an issue\n\n"
                  "Currently open PRs:\n" + pr_list + "\n"
                  "Be helpful, concise, and take action when the context is clear."},
              {"role": "user", "content": f"New issue to process:\n\nTitle: {title}\nBody: {body}"}
          ]

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=json.dumps({
                  "model": "anthropic/claude-sonnet-4",
                  "messages": prompt,
                  "max_tokens": 500
              }).encode(),
              headers={"Authorization": f"Bearer {or_key}",
                       "Content-Type": "application/json"})
          resp = json.loads(urllib.request.urlopen(req).read())
          ai_text = resp["choices"][0]["message"]["content"]

          print("=== AI RESPONSE ===")
          print(ai_text)
          print("===================")

          merge_match = re.search(r"MERGE_PR\s*#?(\d+)", ai_text)
          actions_taken = []
          if merge_match:
              pr_id = merge_match.group(1)
              print(f"\n>>> EXECUTING: merge PR #{pr_id}")
              result = ghapi("PUT",
                  f"https://api.github.com/repos/{repo}/pulls/{pr_id}/merge",
                  {"merge_method": "merge",
                   "commit_message": f"Merged by AI DevOps bot (resolves #{num})"})
              merged = result.get("merged", False)
              if merged:
                  print(f">>> RESULT: PR #{pr_id} MERGED SUCCESSFULLY")
                  actions_taken.append(f"Merged PR #{pr_id}")
              else:
                  msg = result.get("message", "unknown error")
                  print(f">>> RESULT: merge failed - {msg}")
                  actions_taken.append(f"Attempted to merge PR #{pr_id}: {msg}")

          comment = f"**AI DevOps Bot** processed this issue:\n\n{ai_text}"
          if actions_taken:
              comment += "\n\n**Actions taken:** " + ", ".join(actions_taken)
          comment += "\n\n---\n*Automated by AI DevOps Bot*"

          ghapi("POST", f"https://api.github.com/repos/{repo}/issues/{num}/comments",
                {"body": comment})
          PY
