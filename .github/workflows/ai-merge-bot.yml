name: ai-merge-bot
on:
  workflow_dispatch:
    inputs:
      issue_num:
        required: true
jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: AI processes issue and takes action
        env:
          GH_TOKEN: ${{ github.token }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_NUM: ${{ github.event.inputs.issue_num }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PY'
          import json, urllib.request, os, re

          token = os.environ["GH_TOKEN"]
          or_key = os.environ["OPENROUTER_KEY"]
          repo = os.environ["REPO"]
          num = os.environ["ISSUE_NUM"]

          def ghapi(method, url, data=None):
              payload = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=payload, method=method,
                  headers={"Authorization": f"token {token}",
                           "Content-Type": "application/json",
                           "Accept": "application/vnd.github+json"})
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read()), resp.status
              except Exception as e:
                  try: return json.loads(e.read().decode()), getattr(e, 'code', 0)
                  except: return {"error": str(e)}, 0

          issue, _ = ghapi("GET", f"https://api.github.com/repos/{repo}/issues/{num}")
          title = issue.get("title", "")
          body = issue.get("body", "")

          prs, _ = ghapi("GET", f"https://api.github.com/repos/{repo}/pulls?state=open&per_page=10")
          pr_list = ""
          if isinstance(prs, list):
              for p in prs:
                  pr_list += f"  PR #{p['number']}: {p['title']}\n"
          if not pr_list:
              pr_list = "  None\n"

          prompt = [
              {"role": "system", "content":
                  "You are an AI DevOps assistant. You triage issues and manage PRs.\n\n"
                  "Available actions (include in response):\n"
                  "- APPROVE_AND_MERGE #N - approve and merge a PR\n"
                  "- LABEL issue with <label>\n"
                  "- CLOSE_ISSUE #N\n\n"
                  "Open PRs:\n" + pr_list +
                  "\nBe concise and take action when context is clear."},
              {"role": "user", "content": f"Issue to process:\nTitle: {title}\nBody: {body}"}
          ]

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=json.dumps({
                  "model": "anthropic/claude-sonnet-4",
                  "messages": prompt, "max_tokens": 500
              }).encode(),
              headers={"Authorization": f"Bearer {or_key}",
                       "Content-Type": "application/json"})
          resp = json.loads(urllib.request.urlopen(req).read())
          ai_text = resp["choices"][0]["message"]["content"]

          print("AI RESPONSE:")
          print(ai_text)

          actions = []
          merge_m = re.search(r"APPROVE_AND_MERGE\s*#?(\d+)", ai_text)
          if not merge_m:
              merge_m = re.search(r"MERGE_PR\s*#?(\d+)", ai_text)

          if merge_m:
              pr_id = merge_m.group(1)

              print(f"\n>>> Step 1: Approving PR #{pr_id}...")
              approve_r, approve_s = ghapi("POST",
                  f"https://api.github.com/repos/{repo}/pulls/{pr_id}/reviews",
                  {"event": "APPROVE", "body": "Reviewed and approved by AI DevOps Bot."})
              print(f">>> Approve: {approve_s}")
              if approve_s != 200:
                  print(f"    {approve_r}")

              print(f">>> Step 2: Merging PR #{pr_id}...")
              merge_r, merge_s = ghapi("PUT",
                  f"https://api.github.com/repos/{repo}/pulls/{pr_id}/merge",
                  {"merge_method": "merge",
                   "commit_message": f"Merged by AI DevOps bot (resolves #{num})"})
              merged = merge_r.get("merged", False) if isinstance(merge_r, dict) else False
              print(f">>> Merge: {merge_s} merged={merged}")
              if not merged and isinstance(merge_r, dict):
                  print(f"    {merge_r.get('message', merge_r)}")

              if merged:
                  actions.append(f"Approved and merged PR #{pr_id}")
              else:
                  actions.append(f"Approved PR #{pr_id} but merge blocked: {merge_r.get('message','?') if isinstance(merge_r,dict) else '?'}")

          comment = f"**AI DevOps Bot:**\n\n{ai_text}"
          if actions:
              comment += "\n\n**Actions:** " + ", ".join(actions)
          comment += "\n\n---\n*Automated*"
          ghapi("POST", f"https://api.github.com/repos/{repo}/issues/{num}/comments",
                {"body": comment})
          PY
