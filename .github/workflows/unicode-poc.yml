name: unicode-poc
on:
  workflow_dispatch:
    inputs:
      issue_num:
        required: true
        default: '5'
jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: detect-tags
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUM: ${{ github.event.inputs.issue_num }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEND'
          import json, urllib.request, os
          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          num = os.environ["ISSUE_NUM"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{num}",
              headers={"Authorization": f"token {token}"})
          body = json.loads(urllib.request.urlopen(req).read()).get("body", "")
          visible = ''.join(c for c in body if not (0xE0000 <= ord(c) <= 0xE007F))
          tags = [c for c in body if 0xE0000 <= ord(c) <= 0xE007F]
          decoded = ''.join(chr(ord(c) - 0xE0000) for c in tags)
          full = ''.join(chr(ord(c)-0xE0000) if 0xE0000<=ord(c)<=0xE007F else c for c in body)
          print("=" * 60)
          print("VISIBLE TEXT (what a human sees in the browser):")
          print("=" * 60)
          print(visible)
          print()
          print("=" * 60)
          print(f"HIDDEN UNICODE TAGS FOUND: {len(tags)} invisible characters")
          print("=" * 60)
          if decoded:
              print(f"DECODED: {decoded}")
          else:
              print("(none)")
          print()
          print("=" * 60)
          print("FULL TEXT (what an AI agent receives as input):")
          print("=" * 60)
          print(full)
          PYEND
